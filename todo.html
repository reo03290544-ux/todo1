<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1a1a1a;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f7fff;
    }

    .input-row button {
      padding: 10px 18px;
      font-size: 1rem;
      background: #4f7fff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #3a6aee;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 5px 14px;
      font-size: 0.85rem;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f7fff;
      color: #fff;
      border-color: #4f7fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #eee;
      transition: opacity 0.2s;
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f7fff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-title {
      flex: 1;
      font-size: 1rem;
      color: #1a1a1a;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e55;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo</h1>
    <div class="input-row">
      <input type="text" id="newTodo" placeholder="タスクを入力..." />
      <button onclick="addTodo()">追加</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>
    <div class="todo-list" id="todoList"></div>
    <div class="footer" id="footer"></div>
  </div>

  <script>
    let filter = 'all';

    function load() {
      return JSON.parse(localStorage.getItem('todos') || '[]');
    }

    function save(todos) {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const todos = load();
      const list = document.getElementById('todoList');
      const footer = document.getElementById('footer');

      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<div class="empty">タスクがありません</div>';
      } else {
        list.innerHTML = visible.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})" />
            <span class="todo-title">${escape(t.title)}</span>
            <button class="delete-btn" onclick="deleteTodo(${t.id})">x</button>
          </div>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      footer.textContent = `残り ${remaining} 件`;
    }

    function escape(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('newTodo');
      const title = input.value.trim();
      if (!title) return;

      const todos = load();
      const nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;
      todos.push({ id: nextId, title, done: false });
      save(todos);
      input.value = '';
      render();
    }

    function toggleDone(id) {
      const todos = load();
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save(todos);
      render();
    }

    function deleteTodo(id) {
      save(load().filter(t => t.id !== id));
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
